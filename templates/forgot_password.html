<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | SmartLibrary</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/user.css') }}" />
  </head>
  <body>
    <div class="auth-shell">
      <div class="auth-card">
        <div class="auth-hero">
          <div class="auth-brand">
            <div class="auth-logo" aria-hidden="true">🔐</div>
            <div>
              <div style="font-weight: 900; letter-spacing: -0.02em">
                SmartLibrary
              </div>
              <div style="opacity: 0.9; font-size: 12px">Account Help</div>
            </div>
          </div>
          <h1>Forgot Password</h1>
          <p>Reset is not configured yet</p>
        </div>

        <div class="auth-body">
          <div class="auth-subtitle">
            This page is ready so the button works. If you want real password
            reset via email, tell me and I’ll add it.
          </div>

          <div style="display: grid; gap: 10px">
            <a class="btn-primary" href="{{ url_for('auth.contact_admin') }}"
              >Contact Admin</a
            >
            <a class="btn-outline" href="{{ url_for('auth.login_page') }}"
              >Back to login</a
            >
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
